name: 4-DANIEL-COMMUNITY-FE

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/daniel-community-fe:latest
  CONTAINER_NAME: daniel-community-fe

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2 with SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          cat > ssm-parameters.json <<JSON
          {
            "commands": [
              "sudo docker pull ${IMAGE_NAME}",
              "sudo docker stop ${CONTAINER_NAME} || true",
              "sudo docker rm ${CONTAINER_NAME} || true",
              "sudo docker run -d --name ${CONTAINER_NAME} --restart unless-stopped -p 8080:8080 ${IMAGE_NAME}"
            ]
          }
          JSON

          command_id=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy daniel-community-fe Container" \
            --parameters file://ssm-parameters.json \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$command_id" \
            --instance-id "$INSTANCE_ID"

          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$INSTANCE_ID"
